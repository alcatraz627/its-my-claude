<!DOCTYPE html>
<!--
  data-dashboard.html — reusable self-contained data dashboard template.

  Pattern: summary cards + live text filter + click-to-expand rows, each row drilling
  into nested sub-entities and a detail table. Single file, no external deps, dark/light
  toggle that persists. Good for "see counts at a glance + dig into specifics" over any
  entity → sub-entities → detail-rows dataset.

  To reuse:
    1. Replace the ROWS array in the data <script> (or inject via a generator at the
       __DATA__ / __SUMMARY__ / __SRC__ sentinels — keep the template plain, replace by
       string substitution, NOT f-strings, so CSS/JS braces survive).
    2. Adapt the three render functions to your shape: cards() (summary tiles),
       row()/summary line, and the detail render (sub-entity cards + detail table).
    3. Adjust the summary-grid columns in CSS (.row-head grid-template-columns) to match.

  Reference generator (taxonomy+fitment): backend/json_dump/render_taxonomy_dashboard.py
  in the Versable enhancement-product repo. Promoted 2026-05-22.
-->
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Data Dashboard</title>
<style>
  :root[data-theme="dark"]{--bg:#0f1115;--surface:#181b22;--surface2:#1f232c;--text:#e6e9ef;--dim:#8b93a3;--border:#2a2f3a;--accent:#5b9dff;--good:#4ec98a;--zero:#5a6172;}
  :root[data-theme="light"]{--bg:#f6f7f9;--surface:#ffffff;--surface2:#f0f2f5;--text:#1a1d23;--dim:#6b7280;--border:#e1e4ea;--accent:#2563eb;--good:#1a9c5f;--zero:#9aa1ad;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
  header{display:flex;align-items:center;gap:16px;padding:18px 24px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:5}
  h1{font-size:18px;margin:0;font-weight:600}
  .src{color:var(--dim);font-size:12px}
  .toggle{margin-left:auto;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:7px 12px;cursor:pointer;font-size:13px}
  .cards{display:flex;gap:12px;flex-wrap:wrap;padding:18px 24px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 18px;min-width:120px}
  .card .n{font-size:26px;font-weight:700}
  .card .l{color:var(--dim);font-size:12px;text-transform:uppercase;letter-spacing:.04em}
  .wrap{padding:0 24px 40px}
  .search{width:100%;max-width:420px;margin:6px 0 14px;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-size:14px}
  details{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden}
  summary{display:grid;grid-template-columns:2.2fr 1.4fr 1fr auto auto;gap:12px;align-items:center;padding:12px 16px;cursor:pointer;list-style:none}
  summary::-webkit-details-marker{display:none}
  summary:hover{background:var(--surface2)}
  .pt{font-weight:600}
  .cat{color:var(--dim)}
  .pill{justify-self:end;font-variant-numeric:tabular-nums;font-size:12px;padding:3px 9px;border-radius:20px;background:var(--surface2);border:1px solid var(--border)}
  .pill.good{color:var(--good);border-color:var(--good)}
  .pill.zero{color:var(--zero)}
  .body{padding:4px 16px 16px;border-top:1px solid var(--border)}
  .meta{color:var(--dim);font-size:13px;margin:10px 0}
  .meta b{color:var(--text);font-weight:600}
  .prod{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin:8px 0}
  .prod h4{margin:0 0 6px;font-size:13px}
  .prod .mpn{color:var(--accent);font-family:ui-monospace,Menlo,monospace}
  table{width:100%;border-collapse:collapse;font-size:12.5px}
  th,td{text-align:left;padding:5px 8px;border-bottom:1px solid var(--border)}
  th{color:var(--dim);font-weight:500}
  td.na{color:var(--zero)}
  .empty{color:var(--zero);font-style:italic;padding:8px 0}
</style>
</head>
<body>
<header>
  <h1>Data Dashboard</h1>
  <span class="src">__SRC__ (sample data — replace ROWS or inject at sentinels)</span>
  <button class="toggle" onclick="toggleTheme()">◐ theme</button>
</header>
<div class="cards" id="cards"></div>
<div class="wrap">
  <input class="search" id="q" placeholder="Filter…" oninput="render()">
  <div id="list"></div>
</div>
<!-- Replace this array (or the __DATA__/__SUMMARY__ sentinels via a generator) with real data. -->
<script id="data" type="application/json">[
  {"part_type":"Example Brake Pad Set","category":"Braking","sub_category":"Disc Brake","description":"Friction pads for a disc brake caliper.","aliases":"Brake Pads; Pad Kit","confidence":"0.92","product_count":1,"fitment_count":2,
   "products":[{"brand":"BrandX","part_number":"BX-1001","name":"Ceramic Brake Pad Set","fitments":[
     {"make":"Chevrolet","model":"Camaro","sub_model":"SS","years":"1967-1969","engine":"5.7L V8","body":"Coupe"},
     {"make":"Pontiac","model":"Firebird","sub_model":"N/A","years":"1967-1969","engine":"N/A","body":"Coupe"}]}]},
  {"part_type":"Example Universal Cleaner","category":"Chemicals","sub_category":"Cleaners","description":"A non-vehicle-specific shop chemical.","aliases":"Degreaser","confidence":"0.8","product_count":0,"fitment_count":0,"products":[]}
]</script>
<script>
const ROWS = JSON.parse(document.getElementById('data').textContent);
const SUM = {
  parts: ROWS.length,
  categories: new Set(ROWS.map(r=>r.category).filter(Boolean)).size,
  products: ROWS.reduce((a,r)=>a+(r.product_count||0),0),
  fitments: ROWS.reduce((a,r)=>a+(r.fitment_count||0),0),
  with_fitment: ROWS.filter(r=>(r.fitment_count||0)>0).length
};
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function cards(){
  const c=[['parts',SUM.parts],['categories',SUM.categories],['products',SUM.products],['fitments',SUM.fitments],['parts w/ fitment',SUM.with_fitment+' / '+SUM.parts]];
  document.getElementById('cards').innerHTML=c.map(([l,n])=>`<div class="card"><div class="n">${esc(n)}</div><div class="l">${esc(l)}</div></div>`).join('');
}
function fitRow(f){
  const cell=v=>{v=(v==null||v==='')?'—':v; const na=(v==='N/A'||v==='—'); return `<td class="${na?'na':''}">${esc(v)}</td>`;};
  return `<tr>${cell(f.make)}${cell(f.model)}${cell(f.sub_model)}${cell(f.years)}${cell(f.engine)}${cell(f.body)}</tr>`;
}
function product(p){
  const fits=(p.fitments||[]);
  const tbl=fits.length?`<table><thead><tr><th>Make</th><th>Model</th><th>Sub</th><th>Years</th><th>Engine</th><th>Body</th></tr></thead><tbody>${fits.map(fitRow).join('')}</tbody></table>`:`<div class="empty">no detail</div>`;
  return `<div class="prod"><h4>${esc(p.brand)} <span class="mpn">${esc(p.part_number||'—')}</span> — ${esc(p.name||'')}</h4>${tbl}</div>`;
}
function row(r){
  const fc=r.fitment_count, pc=r.product_count;
  const fcls=fc>0?'good':'zero', pcls=pc>0?'':'zero';
  const prods=(r.products||[]);
  const detail=prods.length?prods.map(product).join(''):`<div class="empty">no sub-entities</div>`;
  return `<details><summary>
      <span class="pt">${esc(r.part_type)}</span>
      <span class="cat">${esc(r.category)}${r.sub_category?' · '+esc(r.sub_category):''}</span>
      <span class="cat">conf ${esc(r.confidence||'—')}</span>
      <span class="pill ${pcls}">${pc} prod</span>
      <span class="pill ${fcls}">${fc} fit</span>
    </summary>
    <div class="body">
      <div class="meta"><b>Description:</b> ${esc(r.description)||'—'}</div>
      <div class="meta"><b>Aliases:</b> ${esc(r.aliases)||'—'}</div>
      ${detail}
    </div></details>`;
}
function render(){
  const q=document.getElementById('q').value.toLowerCase().trim();
  const show=ROWS.filter(r=>{
    if(!q) return true;
    const hay=[r.part_type,r.category,r.sub_category,...(r.products||[]).flatMap(p=>[p.brand,p.part_number,p.name])].join(' ').toLowerCase();
    return hay.includes(q);
  });
  document.getElementById('list').innerHTML=show.length?show.map(row).join(''):'<div class="empty">no matches</div>';
}
function toggleTheme(){
  const r=document.documentElement, n=r.getAttribute('data-theme')==='dark'?'light':'dark';
  r.setAttribute('data-theme',n); localStorage.setItem('theme',n);
}
(function(){const t=localStorage.getItem('theme'); if(t) document.documentElement.setAttribute('data-theme',t); cards(); render();})();
</script>
</body>
</html>
